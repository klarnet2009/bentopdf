{{#if simpleMode}} {{> footer-simple}} {{else}}
<footer class="mt-8 border-t border-gray-700 py-4">
  <div class="container mx-auto px-4">
    <div class="flex flex-col md:flex-row items-center justify-between gap-3">
      <div class="flex items-center gap-3">
        <img
          id="footer-logo"
          src="{{baseUrl}}{{#if brandLogo}}{{brandLogo}}{{else}}images/favicon.svg{{/if}}"
          alt="{{#if brandName}}{{brandName}}{{else}}ITERUM PDF{{/if}} Logo"
          class="h-7 w-7"
        />
        <span id="footer-brand" class="text-sm font-bold text-white">{{#if brandName}}{{brandName}}{{else}}ITERUM PDF{{/if}}</span>
        <span class="text-gray-600">·</span>
        <p id="footer-copyright" class="text-gray-500 text-xs" {{#unless footerText}}data-i18n="footer.copyright"{{/unless}}>
          {{#if footerText}}{{footerText}}{{else}}&copy; 2026 ITERUM PDF. All rights reserved.{{/if}}
        </p>
      </div>
      <a href="wasm-settings.html" class="text-gray-500 hover:text-gray-300 text-xs transition-colors">
        Advanced Settings
      </a>
    </div>
  </div>
</footer>
{{/if}}
